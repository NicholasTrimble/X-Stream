name: Trigger auto deployment for xstream-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/xstream-api-AutoDeployTrigger-53164031-5b6d-4524-9d52-0867323e4b08.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.XSTREAMAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.XSTREAMAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.XSTREAMAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUsername: ${{ secrets.XSTREAMAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.XSTREAMAPI_REGISTRY_PASSWORD }}
          containerAppName: xstream-api
          resourceGroup: xstream-backend-api
          imageToBuild: default/xstream-api:${{ github.sha }}
          startupCommand: 'uvicorn backend.main:app --host 0.0.0.0 --port 80'


